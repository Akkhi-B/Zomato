apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: zomato
        image: 700918784883.dkr.ecr.ap-south-1.amazonaws.com/zomato:latest
        ports:
        - containerPort: 3000
